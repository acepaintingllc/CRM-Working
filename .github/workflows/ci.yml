name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
      GOOGLE_CLIENT_ID: dummy-google-client-id
      GOOGLE_CLIENT_SECRET: dummy-google-client-secret
      GOOGLE_DRIVE_ESTIMATES_FOLDER_ID: dummy-estimates-folder-id
      GOOGLE_APPS_SCRIPT_ESTIMATE_PDF_SCRIPT_ID: dummy-script-id
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 120000

          for attempt in 1 2 3; do
            npm ci --no-audit --prefer-offline && exit 0

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "npm ci failed on attempt $attempt. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
