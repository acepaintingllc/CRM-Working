name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
      GOOGLE_CLIENT_ID: dummy-google-client-id
      GOOGLE_CLIENT_SECRET: dummy-google-client-secret
      GOOGLE_SHEETS_ESTIMATE_TEMPLATE_ID: dummy-sheet-template-id
      GOOGLE_DRIVE_ESTIMATE_SHEETS_FOLDER_ID: dummy-drive-folder-id
      GOOGLE_DRIVE_ESTIMATES_FOLDER_ID: dummy-estimates-folder-id
      GOOGLE_APPS_SCRIPT_ESTIMATE_PDF_SCRIPT_ID: dummy-script-id
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
